<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON TRACKER | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #eee; }
        .glass-card { background: #111; border: 1px solid #222; }
        .accent-red { color: #ff3e3e; }
        .bg-red-main { background: #ff3e3e; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px; padding: 4px 8px; outline: none; }
        input:focus { border-color: #ff3e3e; }
        .table-header { font-size: 0.65rem; text-transform: uppercase; color: #666; font-weight: bold; }
    </style>
</head>
<body class="p-4 pb-20">

    <header class="max-w-2xl mx-auto flex justify-between items-center mb-8">
        <h1 class="text-2xl font-black italic tracking-tighter">IRON<span class="accent-red">TRACK</span></h1>
        <input type="date" id="date-selector" class="text-xs font-bold uppercase bg-transparent border-none" onchange="loadDay()">
    </header>

    <main class="max-w-2xl mx-auto space-y-10">
        
        <section>
            <h2 class="text-sm font-bold uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                <i data-lucide="utensils" class="w-4 h-4 accent-red"></i> Nutrición Diaria
            </h2>
            <div id="meal-container" class="space-y-3"></div>
            
            <div class="grid grid-cols-4 gap-2 mt-4 p-4 glass-card rounded-xl border-t-2 border-red-600">
                <div class="text-center"><p class="text-[10px] text-gray-500">P</p><p id="t-p" class="font-bold text-blue-400">0</p></div>
                <div class="text-center"><p class="text-[10px] text-gray-500">C</p><p id="t-c" class="font-bold text-green-400">0</p></div>
                <div class="text-center"><p class="text-[10px] text-gray-500">G</p><p id="t-g" class="font-bold text-yellow-400">0</p></div>
                <div class="text-center"><p class="text-[10px] text-gray-500">KCAL</p><p id="t-k" class="font-bold accent-red">0</p></div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-bold uppercase tracking-[0.2em] flex items-center gap-2">
                    <i data-lucide="dumbbell" class="w-4 h-4 accent-red"></i> Entrenamiento
                </h2>
                <button onclick="addExercise()" class="text-[10px] bg-white text-black font-black px-3 py-1 rounded-full hover:bg-red-500 transition-colors">
                    + AÑADIR EJERCICIO
                </button>
            </div>
            <div id="workout-container" class="space-y-6"></div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
