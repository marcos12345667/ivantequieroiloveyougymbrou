<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>IRON TRACKER | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #ff3e3e; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 16px; transition: all 0.3s ease; }
        input { background: #151515; border: 1px solid #222; color: white; border-radius: 8px; font-size: 16px !important; }
        input:focus { border-color: var(--accent); outline: none; }
        .btn-press:active { transform: scale(0.95); }
        #ai-scanner { background: linear-gradient(to bottom, transparent, var(--accent), transparent); height: 100px; width: 100%; position: absolute; opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-black italic tracking-tighter uppercase">IRON<span class="text-red-600">TRACK</span></h1>
        <div class="bg-white/5 px-3 py-1.5 rounded-full border border-white/10 flex items-center gap-2">
            <i data-lucide="calendar" class="w-3 h-3 text-red-600"></i>
            <input type="date" id="date-selector" class="bg-transparent border-none p-0 text-[10px] font-bold uppercase">
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 space-y-8">
        
        <section class="grid grid-cols-4 gap-2">
            <div class="glass-card p-3 text-center border-b-2 border-blue-600/30">
                <p class="text-[8px] font-bold text-gray-500 uppercase">Prot</p>
                <p id="t-p" class="text-lg font-black">0</p>
            </div>
            <div class="glass-card p-3 text-center border-b-2 border-green-600/30">
                <p class="text-[8px] font-bold text-gray-500 uppercase">Carb</p>
                <p id="t-c" class="text-lg font-black">0</p>
            </div>
            <div class="glass-card p-3 text-center border-b-2 border-yellow-600/30">
                <p class="text-[8px] font-bold text-gray-500 uppercase">Grasa</p>
                <p id="t-g" class="text-lg font-black">0</p>
            </div>
            <div class="glass-card p-3 text-center border-b-2 border-red-600">
                <p class="text-[8px] font-bold text-red-600 uppercase">Kcal</p>
                <p id="t-k" class="text-lg font-black">0</p>
            </div>
        </section>

        <div id="meal-container" class="space-y-3"></div>

        <section class="space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-[10px] font-black uppercase tracking-widest text-gray-500 italic">Entrenamiento</h2>
                <button id="add-ex-btn" class="btn-press bg-white text-black text-[9px] font-black px-4 py-2 rounded-full uppercase">
                    + Ejercicio
                </button>
            </div>
            <div id="workout-container" class="space-y-4"></div>
        </section>

        <button id="finish-btn" class="btn-press w-full bg-red-600 text-white font-black py-5 rounded-2xl italic uppercase tracking-tighter shadow-xl shadow-red-900/20">
            Finalizar y Analizar con IA
        </button>

    </main>

    <div id="ai-modal" class="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6 hidden">
        <div class="glass-card w-full max-w-sm p-6 border-red-600/50 relative overflow-hidden">
            <div id="ai-scanner"></div>
            <div class="relative z-10 space-y-4">
                <div class="flex items-center gap-2">
                    <i data-lucide="zap" class="text-red-600 fill-red-600"></i>
                    <h3 class="font-black italic uppercase tracking-tighter">Análisis de Bestia</h3>
                </div>
                <p id="ai-response" class="text-sm text-gray-300 italic leading-relaxed"></p>
                <button onclick="closeAI()" class="w-full py-3 bg-white/5 rounded-xl font-bold text-[10px] uppercase tracking-widest border border-white/10">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html><!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --accent: #ff3e3e; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            color: #fff; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        
        .glass-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 16px; }
        
        /* Optimización de Inputs para Móvil */
        input { 
            background: #151515; 
            border: 1px solid #222; 
            color: white; 
            border-radius: 8px; 
            font-size: 16px !important; /* Evita zoom automático en iOS */
            transition: all 0.2s ease;
        }
        input:focus { border-color: var(--accent); background: #1a1a1a; }
        
        /* Tablas tipo App Deportiva */
        .set-row { display: grid; grid-template-columns: 0.5fr 1.5fr 1.5fr 0.5fr; gap: 8px; align-items: center; }
        
        .btn-press { transition: transform 0.1s active; }
        .btn-press:active { transform: scale(0.96); }

        /* Scrollbar invisible */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="safe-area-inset">

    <nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-black italic tracking-tighter uppercase">IRON<span class="text-red-600">TRACK</span></h1>
        <div class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
            <i data-lucide="calendar" class="w-3.5 h-3.5 text-red-600"></i>
            <input type="date" id="date-selector" class="bg-transparent border-none p-0 text-[11px] font-bold uppercase outline-none cursor-pointer">
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 space-y-8">
        
        <section class="grid grid-cols-4 gap-2">
            <div class="glass-card p-3 text-center">
                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">P</p>
                <p id="t-p" class="text-lg font-black text-blue-500">0</p>
            </div>
            <div class="glass-card p-3 text-center">
                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">C</p>
                <p id="t-c" class="text-lg font-black text-green-500">0</p>
            </div>
            <div class="glass-card p-3 text-center">
                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">G</p>
                <p id="t-g" class="text-lg font-black text-yellow-500">0</p>
            </div>
            <div class="glass-card p-3 text-center border-red-900/40">
                <p class="text-[9px] font-bold text-red-600 uppercase tracking-widest italic">Kcal</p>
                <p id="t-k" class="text-lg font-black text-white">0</p>
            </div>
        </section>

        <section class="space-y-4">
            <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 px-1">Plan Nutricional</h2>
            <div id="meal-container" class="space-y-2"></div>
        </section>

        <section class="space-y-4 pb-10">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500">Sesión de Fuerza</h2>
                <button id="add-ex-btn" class="btn-press bg-red-600 text-white text-[10px] font-black px-4 py-2 rounded-full shadow-lg shadow-red-900/20 uppercase italic">
                    + Ejercicio
                </button>
            </div>
            <div id="workout-container" class="space-y-4"></div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
