<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON TRACKER | Premium Fitness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .accent-gradient { background: linear-gradient(90deg, #ff3e3e, #ff8e3e); }
        .input-dark { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-4xl mx-auto flex justify-between items-center mb-12">
        <h1 class="text-3xl font-black tracking-tighter italic text-white">IRON<span class="text-red-500">TRACK</span></h1>
        <div class="flex items-center gap-2">
            <span class="text-xs font-bold uppercase tracking-widest text-gray-500">Status:</span>
            <span class="px-2 py-1 bg-green-500/10 text-green-500 text-[10px] rounded-full font-bold">PREMIUM ACCESS</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto space-y-8">
        
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="glass-card p-4 rounded-2xl text-center">
                <p class="text-gray-500 text-xs font-bold uppercase mb-1">Proteína</p>
                <p id="prot-total" class="text-2xl font-black text-white">0g</p>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center">
                <p class="text-gray-500 text-xs font-bold uppercase mb-1">Carbos</p>
                <p id="carb-total" class="text-2xl font-black text-white">0g</p>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center">
                <p class="text-gray-500 text-xs font-bold uppercase mb-1">Grasas</p>
                <p id="fat-total" class="text-2xl font-black text-white">0g</p>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center border-red-500/30">
                <p class="text-red-500 text-xs font-bold uppercase mb-1">Kcal</p>
                <p id="kcal-total" class="text-2xl font-black text-white">0</p>
            </div>
        </section>

        <section class="space-y-4">
            <h2 class="text-xl font-bold flex items-center gap-2 text-white">
                <i data-lucide="utensils" class="w-5 h-5 text-red-500"></i> Nutrición Diaria
            </h2>
            <div id="meal-container" class="grid gap-3">
                </div>
        </section>

        <section class="space-y-4">
            <h2 class="text-xl font-bold flex items-center gap-2 text-white">
                <i data-lucide="dumbbell" class="w-5 h-5 text-red-500"></i> Registro de Entrenamiento
            </h2>
            <div class="glass-card p-6 rounded-2xl">
                <div class="flex flex-col md:flex-row gap-3">
                    <input type="text" id="workout-input" placeholder="Ej: Press Banca 4x12 80kg" class="flex-1 input-dark focus:border-red-500 outline-none transition-all">
                    <button onclick="addWorkout()" class="accent-gradient text-black font-bold px-6 py-2 rounded-lg hover:scale-105 active:scale-95 transition-transform">
                        REGISTRAR
                    </button>
                </div>
                <ul id="workout-list" class="mt-4 space-y-2">
                    </ul>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
