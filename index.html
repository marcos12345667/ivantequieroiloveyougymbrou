<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>IRON TRACKER | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #eee; }
        .glass-card { background: #111; border: 1px solid #222; border-radius: 12px; }
        .accent-red { color: #ff3e3e; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 6px; padding: 8px; outline: none; }
        input:focus { border-color: #ff3e3e; }
        .table-header { font-size: 0.65rem; text-transform: uppercase; color: #666; font-weight: bold; }
    </style>
</head>

    <header class="max-w-2xl mx-auto flex justify-between items-center mb-8 border-b border-white/5 pb-4">

        <section>
            <h2 class="text-xs font-black uppercase tracking-widest mb-4 flex items-center gap-2 text-gray-400">

            </h2>
            <div id="meal-container" class="space-y-4"></div>
