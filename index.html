<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON TRACKER PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .accent-gradient { background: linear-gradient(90deg, #ff3e3e, #ff8e3e); }
        .input-dark { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px; color: white; width: 100%; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <h1 class="text-3xl font-black italic tracking-tighter text-white">IRON<span class="text-red-500">TRACK</span></h1>
        
        <div class="glass-card px-4 py-2 rounded-full flex items-center gap-3 border-red-500/50">
            <i data-lucide="calendar" class="w-5 h-5 text-red-500"></i>
            <input type="date" id="date-selector" class="bg-transparent border-none outline-none text-white font-bold" onchange="loadDay()">
        </div>
    </header>

    <main class="max-w-4xl mx-auto space-y-8">
        
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="glass-card p-4 rounded-2xl text-center border-b-2 border-blue-500/30">
                <p class="text-gray-500 text-[10px] font-bold uppercase">Proteína</p>
                <p id="prot-total" class="text-2xl font-black">0g</p>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center border-b-2 border-green-500/30">
                <p class="text-gray-500 text-[10px] font-bold uppercase">Carbos</p>
                <p id="carb-total" class="text-2xl font-black">0g</p>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center border-b-2 border-yellow-500/30">
                <p class="text-gray-500 text-[10px] font-bold uppercase">Grasas</p>
                <p id="fat-total" class="text-2xl font-black">0g</p>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center border-b-2 border-red-500/30">
                <p class="text-red-500 text-[10px] font-bold uppercase">Total Kcal</p>
                <p id="kcal-total" class="text-2xl font-black">0</p>
            </div>
        </section>

        <section class="space-y-4">
            <h2 class="text-xl font-bold flex items-center gap-2 text-white uppercase tracking-widest text-sm">
                <i data-lucide="utensils-crossbones" class="w-5 h-5 text-red-500"></i> Nutrición
            </h2>
            <div id="meal-container" class="space-y-3">
                </div>
        </section>

        <section class="space-y-4">
            <h2 class="text-xl font-bold flex items-center gap-2 text-white uppercase tracking-widest text-sm">
                <i data-lucide="activity" class="w-5 h-5 text-red-500"></i> Bitácora de Entrenamiento
            </h2>
            <div class="glass-card p-6 rounded-2xl">
                <div class="flex gap-3">
                    <input type="text" id="workout-input" placeholder="Ejercicio, series, peso..." class="input-dark">
                    <button onclick="addWorkout()" class="accent-gradient text-black font-black px-6 rounded-lg transition-transform active:scale-95">
                        ADD
                    </button>
                </div>
                <ul id="workout-list" class="mt-6 space-y-3"></ul>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
